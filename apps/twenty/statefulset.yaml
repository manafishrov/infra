apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: twenty
  namespace: manafishrov-twenty
spec:
  replicas: 1
  selector:
    matchLabels:
      app: twenty
  serviceName: twenty-internal
  template:
    metadata:
      labels:
        app: twenty
    spec:
      # Twenty image runs as uid 1000 (node user); fsGroup lets the PVC be
      # writable for the .local-storage scratch dir used for transient files
      # even when STORAGE_TYPE=s3.
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: twenty
          image: twentycrm/twenty:v2.18.4@sha256:b969c9bfe6eda5f31d2d31c14c589184aafdfec0a9a4cb00e86401b64b5e55e1
          envFrom:
            - secretRef:
                name: twenty-env
          env:
            - name: NODE_PORT
              value: "3000"
            - name: SERVER_URL
              value: https://crm.manafishrov.com
            - name: REDIS_URL
              value: redis://valkey:6379
            - name: STORAGE_TYPE
              value: s3
            - name: STORAGE_S3_REGION
              value: us-east-1
            - name: STORAGE_S3_NAME
              value: manafishrov-twenty
            - name: STORAGE_S3_ENDPOINT
              value: http://rustfs-svc.rustfs.svc.cluster.local:9000
            - name: STORAGE_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: manafishrov-rustfs-outputs
                  key: manafishrov_twenty_rustfs_access_key_id
            - name: STORAGE_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: manafishrov-rustfs-outputs
                  key: manafishrov_twenty_rustfs_secret_access_key
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: manafishrov-postgres-outputs
                  key: manafishrov_twenty_db_password
            - name: PG_DATABASE_URL
              value: postgres://manafishrov_twenty_app:$(PG_PASSWORD)@postgres.postgres.svc.cluster.local:5432/manafishrov_twenty
          ports:
            - containerPort: 3000
              name: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            failureThreshold: 60
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 2Gi
          volumeMounts:
            - mountPath: /app/packages/twenty-server/.local-storage
              name: data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
        storageClassName: nvme-ha
