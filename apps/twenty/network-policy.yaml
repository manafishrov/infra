apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: twenty
  namespace: manafishrov-twenty
spec:
  endpointSelector:
    matchLabels:
      app: twenty
  ingress:
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            app: oauth2-proxy
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
    # /rest/* and /file/* HTTPRoute rules send traffic directly from the
    # gateway to the twenty pod, bypassing oauth2-proxy.
    - fromEntities:
        - ingress
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: manafishrov-twenty
            k8s:app: valkey
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: postgres
            k8s:app: postgres
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    - toEntities:
        - cluster
        - world
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: twenty-worker
  namespace: manafishrov-twenty
spec:
  endpointSelector:
