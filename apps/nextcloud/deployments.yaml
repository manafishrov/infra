apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey
  namespace: manafishrov-nextcloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: valkey
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: valkey
    spec:
      containers:
        - name: valkey
          image: valkey/valkey:9.1.1-alpine@sha256:3fe38a705227d29534a199e876b38d5474dec4d3baca980ac6894df539416562
          args:
            - --maxmemory
            - 256mb
            - --maxmemory-policy
            - allkeys-lru
            - --save
            - ""
            - --appendonly
            - "no"
          ports:
            - containerPort: 6379
              name: redis
          livenessProbe:
            tcpSocket:
              port: redis
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["valkey-cli", "ping"]
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 320Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: imaginary
  namespace: manafishrov-nextcloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: imaginary
  template:
    metadata:
      labels:
        app: imaginary
    spec:
      containers:
        - name: imaginary
          image: nextcloud/aio-imaginary:20260515_145717@sha256:7da4087a68bbec348d2194810d7ecf2b8b5f13b1e51296f923fb262bb1073ec5
          args:
            - -log-level
            - warn
            - -concurrency
            - "20"
            - -return-size
          ports:
            - containerPort: 9000
              name: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: collabora
  namespace: manafishrov-nextcloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: collabora
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: collabora
    spec:
      containers:
        - name: collabora
          # 26.04.2.2.1 drops probe connections to /hosting/discovery (EOF)
          # so kubelet liveness-kills an otherwise healthy server in a loop.
          # Verify the probes stay green before accepting the next bump.
          image: collabora/code:26.04.2.4.1@sha256:1f864ce3f0c49e867787b6dd303bd6ba989542d3023f6809df558eafd04c1b97
          env:
            - name: aliasgroup1
              value: https://cloud.manafishrov.com
            - name: server_name
              value: office.manafishrov.com
            - name: extra_params
              value: >-
                --o:ssl.enable=false
                --o:ssl.termination=true
                --o:net.proto=IPv4
                --o:net.post_allow.host[0]=10\.42\..*
                --o:net.post_allow.host[1]=::ffff:10\.42\..*
                --o:net.post_allow.host[2]=fd42:.*
            - name: dictionaries
              value: en_GB en_US nb_NO
          ports:
            - containerPort: 9980
              name: http
          livenessProbe:
            httpGet:
              path: /hosting/discovery
              port: http
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /hosting/discovery
              port: http
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whiteboard
  namespace: manafishrov-nextcloud
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: whiteboard
  template:
    metadata:
      labels:
        app: whiteboard
    spec:
      containers:
        - name: whiteboard
          image: ghcr.io/nextcloud-releases/whiteboard:v1.5.9@sha256:b60b7633f90d106ac6922f9bc27e1a1ca2442488b740fefdae4c812f34e9cebc
          env:
            - name: NEXTCLOUD_URL
              value: http://nextcloud
            - name: STORAGE_STRATEGY
              value: redis
            - name: REDIS_URL
              value: redis://valkey:6379/1
            - name: PORT
              value: "3002"
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: nextcloud-env
                  key: WHITEBOARD_JWT_SECRET
          ports:
            - containerPort: 3002
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
