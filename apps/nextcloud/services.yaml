apiVersion: v1
kind: Service
metadata:
  name: nextcloud-internal
  namespace: manafishrov-nextcloud
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: nextcloud
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: nextcloud
  namespace: manafishrov-nextcloud
spec:
  selector:
    app: nextcloud
  ports:
    - name: http
      port: 80
      targetPort: http
---
