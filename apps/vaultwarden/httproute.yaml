apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vaultwarden-public
  namespace: manafishrov-vaultwarden
spec:
  parentRefs:
    - name: public
      namespace: gateway
      sectionName: https
  hostnames:
    - vault.manafishrov.com
  rules:
    - backendRefs:
        - name: vaultwarden
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vaultwarden-public-redirect
  namespace: manafishrov-vaultwarden
spec:
  parentRefs:
    - name: public
      namespace: gateway
      sectionName: http
  hostnames:
    - vault.manafishrov.com
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
