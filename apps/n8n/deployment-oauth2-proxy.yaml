apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: manafishrov-n8n
spec:
  replicas: 2
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.2@sha256:aa0bd8dd5ab0c78e4c91c92755ad573a5f92241f88138b4141b8ec803463b4fd
          args:
            - --provider=oidc
            - --oidc-issuer-url=https://id.manafishrov.com
            - --redirect-url=https://n8n.manafishrov.com/oauth2/callback
            - --upstream=http://n8n.manafishrov-n8n.svc.cluster.local:5678
            - --http-address=0.0.0.0:4180
            - --reverse-proxy=true
            - --cookie-secure=true
            - --cookie-samesite=lax
            - --cookie-expire=12h
            - --cookie-refresh=1h
            - --email-domain=*
            - --skip-provider-button=true
            - --pass-access-token=false
            - --pass-authorization-header=false
            - --set-xauthrequest=true
            - --scope=openid profile email
            - --skip-jwt-bearer-tokens=false
            - --whitelist-domain=n8n.manafishrov.com
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: manafishrov-identity-outputs
                  key: n8n_pocketid_client_id
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: manafishrov-identity-outputs
                  key: n8n_pocketid_client_secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: n8n-oauth2-proxy
                  key: cookie_secret
          ports:
            - containerPort: 4180
              name: http
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /ping
              port: http
            periodSeconds: 5
            failureThreshold: 12
