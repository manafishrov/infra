apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: n8n
  namespace: manafishrov-n8n
spec:
  endpointSelector:
    matchLabels:
      app: n8n
  ingress:
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "5678"
              protocol: TCP
    # Editor and API traffic arrives via oauth2-proxy. Webhook traffic
    # arrives directly from the gateway (intentional bypass).
    - fromEndpoints:
        - matchLabels:
            app: oauth2-proxy
      toPorts:
        - ports:
            - port: "5678"
              protocol: TCP
    - fromEntities:
        - ingress
      toPorts:
        - ports:
            - port: "5678"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toEntities:
        - cluster
        - world
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: oauth2-proxy
  namespace: manafishrov-n8n
spec:
  endpointSelector:
    matchLabels:
      app: oauth2-proxy
  ingress:
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "4180"
              protocol: TCP
    - fromEntities:
        - ingress
      toPorts:
        - ports:
            - port: "4180"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toEntities:
        - cluster
        - world
