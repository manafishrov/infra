apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pocket-id-public
  namespace: manafishrov-pocket-id
spec:
  parentRefs:
    - name: public
      namespace: gateway
      sectionName: https
  hostnames:
    - id.manafishrov.com
  rules:
    - backendRefs:
        - name: pocket-id
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pocket-id-public-redirect
  namespace: manafishrov-pocket-id
spec:
  parentRefs:
    - name: public
      namespace: gateway
      sectionName: http
  hostnames:
    - id.manafishrov.com
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
