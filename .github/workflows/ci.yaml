name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover:
    runs-on: ubuntu-24.04
    outputs:
      tofu-stacks: ${{ steps.list-tofu.outputs.stacks }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - id: list-tofu
        run: |
          stacks=$(printf '%s\n' tofu/*/ | xargs -n1 basename | sort | jq -R . | jq -sc .)
          echo "stacks=$stacks" >> "$GITHUB_OUTPUT"

  validate-kubernetes:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
      - name: Install Tools
        run: nix profile install nixpkgs#kustomize nixpkgs#kubeconform
      - name: Validate Kubernetes Manifests
        run: |
          kustomize build . | \
          kubeconform \
            -strict \
            -ignore-missing-schemas \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -verbose

  validate-tofu:
    needs: discover
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        stack: ${{ fromJSON(needs.discover.outputs.tofu-stacks) }}
    env:
      OPENTOFU_VERSION: 1.11.5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
        with:
          tofu_version: ${{ env.OPENTOFU_VERSION }}
          tofu_wrapper: false
      - name: Check OpenTofu formatting
        run: tofu -chdir=tofu/${{ matrix.stack }} fmt -check
      - name: Initialize OpenTofu
        run: tofu -chdir=tofu/${{ matrix.stack }} init -backend=false
      - name: Validate OpenTofu
        run: tofu -chdir=tofu/${{ matrix.stack }} validate
